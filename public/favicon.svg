<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Right (kraft) face -->
  <polygon points="32,16 56,22 56,52 32,58" fill="#c69968"/>
  <!-- Front (green storage door) face -->
  <polygon points="8,22 32,16 32,58 8,52" fill="#cfa97c"/>
  <!-- Top flap -->
  <polygon points="8,22 32,16 56,22 32,28" fill="#e0c19a"/>
  <polyline points="32,16 32,28" stroke="#a87f53" stroke-width="0.6" fill="none"/>
  <!-- Tape strip across top -->
  <polygon points="20,19 32,16 32,21 20,24" fill="#b9905f" opacity="0.6"/>
  <polygon points="32,16 44,19 44,24 32,21" fill="#b9905f" opacity="0.6"/>

  <!-- Storage roller door on front face -->
  <polygon points="11,28 28,24 28,55 11,52" fill="#88b7a3"/>
  <polygon points="11,28 28,24 28,26 11,30" fill="#9ec7b3"/>
  <!-- Door slats -->
  <g stroke="#5b8b78" stroke-width="0.5" fill="none">
    <line x1="11" y1="33" x2="28" y2="29"/>
    <line x1="11" y1="36" x2="28" y2="32"/>
    <line x1="11" y1="39" x2="28" y2="35"/>
    <line x1="11" y1="42" x2="28" y2="38"/>
    <line x1="11" y1="45" x2="28" y2="41"/>
    <line x1="11" y1="48" x2="28" y2="44"/>
    <line x1="11" y1="51" x2="28" y2="47"/>
  </g>
  <!-- Yellow latch -->
  <rect x="23" y="44" width="3.5" height="2" fill="#f2c84a" transform="skewY(-8)"/>

  <!-- Recycle symbol on right face -->
  <g fill="#3b2a14" transform="translate(38,38)">
    <path d="M0,0 l3,-2 l-1,3 z"/>
    <path d="M3,1 l3,2 l-3,1 z"/>
    <path d="M-2,3 l-1,3 l3,-1 z"/>
  </g>
  <!-- Up arrows on right face -->
  <g fill="#3b2a14" transform="translate(49,30) skewY(20)">
    <polygon points="0,0 2,-3 4,0 3,0 3,5 1,5 1,0"/>
    <polygon points="6,0 8,-3 10,0 9,0 9,5 7,5 7,0"/>
  </g>
</svg>
